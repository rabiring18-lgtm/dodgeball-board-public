<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111821">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ROCKS">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="./manifest.webmanifest">
  <title>ROCKS 戦術ボード</title>
  <style>
    :root {
      --rocks-bg: #0b0f15;
      --rocks-bg-mid: #111821;
      --rocks-panel: #151b23;
      --rocks-panel-light: #202936;
      --rocks-panel-dark: #0f141b;
      --rocks-border: #343e4b;
      --rocks-silver: #aeb7c3;
      --rocks-text: #f5f7fa;
      --rocks-muted: #8d98a6;
      --rocks-red: #c51f35;
      --rocks-red-bright: #ee3048;
      --rocks-blue: #2d7ee8;
      --rocks-shadow: rgba(0, 0, 0, 0.35);
      --rocks-radius: 12px;
      --line: #222832;
      --paper: #eef2f5;
      --blue: #1d68d8;
      --blue-soft: #dcecff;
      --red: #d93636;
      --red-soft: #ffe3e3;
      --ink: var(--rocks-text);
      --panel: var(--rocks-panel);
      --button: #1a222d;
      --button-border: #5d6876;
      --active: var(--rocks-red);
      --active-border: var(--rocks-red-bright);
      --shadow: 0 16px 42px var(--rocks-shadow);
    }
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 50% 26%, rgba(58, 70, 88, 0.58), transparent 38%),
        radial-gradient(circle at 78% 7%, rgba(197, 31, 53, 0.13), transparent 28%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px) 0 0 / 18px 18px,
        linear-gradient(90deg, rgba(174, 183, 195, 0.035) 1px, transparent 1px) 0 0 / 44px 44px,
        linear-gradient(0deg, rgba(174, 183, 195, 0.028) 1px, transparent 1px) 0 0 / 44px 44px,
        radial-gradient(ellipse at center, transparent 48%, rgba(0, 0, 0, 0.38) 100%),
        linear-gradient(180deg, var(--rocks-bg-mid), var(--rocks-bg));
      color: var(--rocks-text);
      font-family: "Segoe UI Variable", "Segoe UI", "Noto Sans JP", "Yu Gothic UI", sans-serif;
      overscroll-behavior: none;
    }
    body { min-height: 100svh; }
    .app {
      height: 100dvh;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: max(8px, env(safe-area-inset-top)) max(8px, env(safe-area-inset-right)) max(8px, env(safe-area-inset-bottom)) max(8px, env(safe-area-inset-left));
      overflow: hidden;
    }
    header {
      flex: 0 0 auto;
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      gap: 5px;
      padding: 5px 6px;
      min-height: 58px;
      position: relative;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent 42%),
        linear-gradient(90deg, var(--rocks-panel-dark), var(--rocks-panel), var(--rocks-panel-dark));
      border: 1px solid rgba(174, 183, 195, 0.24);
      border-bottom: 3px solid var(--rocks-red);
      border-radius: var(--rocks-radius);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      overflow: visible;
    }
    header::before {
      content: "";
      flex: 0 0 auto;
      width: 4px;
      height: 28px;
      background: linear-gradient(180deg, var(--rocks-red-bright), var(--rocks-red));
      transform: skewX(-18deg);
      border-radius: 2px;
      box-shadow: 10px 0 0 rgba(197, 31, 53, 0.32);
    }
    header::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.28), transparent);
      pointer-events: none;
    }
    h1 {
      margin: 0;
      flex: 0 1 auto;
      min-width: 0;
      font-size: clamp(13px, 1.45vw, 20px);
      line-height: 1.2;
      white-space: nowrap;
      color: var(--rocks-silver);
      font-weight: 900;
      letter-spacing: 0;
    }
    h1 .brand {
      color: var(--rocks-text);
      letter-spacing: 0.08em;
    }
    h1 .accent {
      color: var(--rocks-red-bright);
    }
    .controls {
      flex: 1 1 auto;
      display: flex;
      flex-wrap: nowrap;
      gap: 4px;
      justify-content: center;
      align-items: center;
      min-width: 0;
      overflow: visible;
    }
    button {
      flex: 0 1 auto;
      min-height: 38px;
      border: 1px solid rgba(174, 183, 195, 0.52);
      border-radius: 9px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent 44%),
        linear-gradient(180deg, #242d39, #151c25);
      color: var(--rocks-text);
      padding: 6px 8px;
      font: inherit;
      font-size: clamp(10px, 1.2vw, 13px);
      font-weight: 800;
      line-height: 1.15;
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.09), 0 2px 0 rgba(0, 0, 0, 0.28);
      transition: transform 150ms ease, border-color 150ms ease, background 150ms ease, box-shadow 150ms ease;
    }
    button:focus-visible {
      outline: 3px solid rgba(201, 31, 47, 0.42);
      outline-offset: 2px;
    }
    button:hover {
      border-color: rgba(238, 48, 72, 0.58);
      transform: translateY(-1px);
    }
    button:active {
      transform: translateY(1px);
      box-shadow: inset 0 1px 6px rgba(0, 0, 0, 0.36);
    }
    button.active {
      background:
        linear-gradient(180deg, var(--rocks-red-bright), var(--rocks-red));
      border-color: var(--active-border);
      color: #ffffff;
      transform: translateY(1px);
      box-shadow: 0 0 12px rgba(238, 48, 72, 0.24), inset 0 2px 5px rgba(0, 0, 0, 0.22);
    }
    .fullscreen-panel button.active {
      background: var(--active);
      border-color: var(--active-border);
      color: #ffffff;
    }
    .match-info-label {
      fill: #ffffff;
      font-size: 0.34px;
      font-weight: 900;
      text-anchor: middle;
      dominant-baseline: middle;
      letter-spacing: 0.02px;
      pointer-events: none;
    }
    .match-info-plate {
      fill: rgba(10, 14, 20, 0.82);
      stroke: rgba(255, 255, 255, 0.22);
      stroke-width: 0.025;
      pointer-events: none;
    }
    .counter {
      position: absolute;
      right: calc(50% - var(--board-w) / 2 + var(--bench-x-pad));
      bottom: calc(50% - var(--board-h) / 2 + var(--bench-y-pad));
      z-index: 4;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 1px;
      padding: 4px 7px;
      border-radius: 8px;
      border: 1px solid rgba(174, 183, 195, 0.58);
      border-left: 4px solid var(--rocks-red-bright);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent 45%),
        rgba(14, 20, 28, 0.9);
      color: #ffffff;
      font-weight: 800;
      font-size: clamp(9px, 1.05vw, 11px);
      line-height: 1.15;
      white-space: nowrap;
      pointer-events: none;
      box-shadow: inset 0 1px 9px rgba(0, 0, 0, 0.42), 0 4px 14px rgba(0, 0, 0, 0.2);
    }
    .counter span {
      display: block;
      line-height: 1.1;
      color: #ffffff;
    }
    .save-board {
      position: absolute;
      left: calc(50% - var(--board-w) / 2 + var(--bench-x-pad));
      bottom: calc(50% - var(--board-h) / 2 + var(--bench-y-pad));
      z-index: 4;
      min-height: clamp(28px, calc(var(--board-h) / 6 - 8px), 34px);
      padding: 4px 9px;
      border-left: 4px solid var(--rocks-red-bright);
      font-size: clamp(10px, 1.15vw, 12px);
    }
    .settings-board {
      position: absolute;
      left: calc(50% - var(--board-w) / 2 + var(--bench-x-pad) + 86px);
      bottom: calc(50% - var(--board-h) / 2 + var(--bench-y-pad));
      z-index: 4;
      min-height: clamp(28px, calc(var(--board-h) / 6 - 8px), 34px);
      padding: 4px 9px;
      border-left: 4px solid var(--rocks-red-bright);
      font-size: clamp(10px, 1.15vw, 12px);
    }
    .fullscreen-toggle {
      display: none;
    }
    @media (max-width: 1366px), (pointer: coarse) {
      .fullscreen-toggle {
        display: inline-block;
      }
    }
    .board-wrap {
      position: relative;
      flex: 1 1 auto;
      --board-w: min(100cqw, calc(100cqh * 1.6667));
      --board-h: calc(var(--board-w) * 0.6);
      --bench-x-pad: clamp(10px, calc(var(--board-w) * 0.03), 34px);
      --bench-y-pad: clamp(5px, calc(var(--board-h) * 0.015), 10px);
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 7px;
      background:
        linear-gradient(var(--rocks-red-bright), var(--rocks-red-bright)) left 10px top 10px / 28px 3px no-repeat,
        linear-gradient(var(--rocks-red-bright), var(--rocks-red-bright)) left 10px top 10px / 3px 28px no-repeat,
        linear-gradient(var(--rocks-red-bright), var(--rocks-red-bright)) right 10px top 10px / 28px 3px no-repeat,
        linear-gradient(var(--rocks-red-bright), var(--rocks-red-bright)) right 10px top 10px / 3px 28px no-repeat,
        linear-gradient(var(--rocks-red-bright), var(--rocks-red-bright)) left 10px bottom 10px / 28px 3px no-repeat,
        linear-gradient(var(--rocks-red-bright), var(--rocks-red-bright)) left 10px bottom 10px / 3px 28px no-repeat,
        linear-gradient(var(--rocks-red-bright), var(--rocks-red-bright)) right 10px bottom 10px / 28px 3px no-repeat,
        linear-gradient(var(--rocks-red-bright), var(--rocks-red-bright)) right 10px bottom 10px / 3px 28px no-repeat,
        linear-gradient(90deg, rgba(174, 183, 195, 0.055) 1px, transparent 1px) 0 0 / 32px 32px,
        linear-gradient(0deg, rgba(174, 183, 195, 0.045) 1px, transparent 1px) 0 0 / 32px 32px,
        radial-gradient(circle at 50% 20%, rgba(238, 48, 72, 0.12), transparent 44%),
        linear-gradient(180deg, #18202a, #0d1218);
      border: 6px solid #111720;
      outline: 1px solid rgba(174, 183, 195, 0.38);
      outline-offset: -7px;
      border-radius: 14px;
      box-shadow: 0 22px 48px rgba(0, 0, 0, 0.42), inset 0 0 28px rgba(0, 0, 0, 0.48);
      overflow: hidden;
      container-type: size;
    }
    .board-wrap::before,
    .board-wrap::after {
      content: "";
      position: absolute;
      z-index: 2;
      width: 28px;
      height: 28px;
      pointer-events: none;
    }
    .board-wrap::before {
      left: 10px;
      top: 10px;
      border-left: 3px solid var(--rocks-red-bright);
      border-top: 3px solid var(--rocks-red-bright);
    }
    .board-wrap::after {
      right: 10px;
      bottom: 10px;
      border-right: 3px solid var(--rocks-red-bright);
      border-bottom: 3px solid var(--rocks-red-bright);
    }
    svg {
      display: block;
      width: min(100%, calc(100cqh * 1.6667));
      height: auto;
      aspect-ratio: 5 / 3;
      max-width: 100%;
      max-height: 100%;
      background: #111821;
      border-radius: 0;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.16), inset 0 0 26px rgba(0, 0, 0, 0.24);
      user-select: none;
      touch-action: none;
    }
    .area-a { fill: url(#blueOuter); }
    .area-b { fill: url(#redOuter); }
    .inner-area-a { fill: url(#blueInner); }
    .inner-area-b { fill: url(#redInner); }
    .court-line {
      fill: none;
      stroke: rgba(20, 27, 36, 0.9);
      stroke-width: 0.07;
      vector-effect: non-scaling-stroke;
      filter: drop-shadow(0 0.018px 0.02px rgba(255, 255, 255, 0.55));
    }
    .court-line-shine {
      fill: none;
      stroke: rgba(255, 255, 255, 0.5);
      stroke-width: 0.018;
      vector-effect: non-scaling-stroke;
      pointer-events: none;
    }
    .center-line {
      stroke: rgba(255, 255, 255, 0.66);
      stroke-width: 0.024;
      filter: none;
    }
    .court-decoration,
    .bench-deck,
    .watermark {
      pointer-events: none;
    }
    .bench-deck {
      fill: url(#benchDeck);
    }
    .watermark {
      fill: rgba(174, 183, 195, 0.12);
      font-size: 1.15px;
      font-weight: 900;
      letter-spacing: 0.28px;
      text-anchor: middle;
      dominant-baseline: middle;
    }
    .watermark-line {
      stroke: rgba(238, 48, 72, 0.34);
      stroke-width: 0.035;
      vector-effect: non-scaling-stroke;
      pointer-events: none;
    }
    .team-glow-red {
      fill: none;
      stroke: rgba(238, 48, 72, 0.22);
      stroke-width: 0.045;
      vector-effect: non-scaling-stroke;
      pointer-events: none;
    }
    .team-glow-blue {
      fill: none;
      stroke: rgba(45, 126, 232, 0.2);
      stroke-width: 0.045;
      vector-effect: non-scaling-stroke;
      pointer-events: none;
    }
    .label {
      fill: rgba(72, 83, 99, 0.52);
      font-size: 0.52px;
      font-weight: 700;
      letter-spacing: 0.02px;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
      filter: drop-shadow(0 0.025px 0.015px rgba(255, 255, 255, 0.38));
    }
    .player, .ball { cursor: grab; }
    .player circle:not(.hit-ring) {
      stroke: none;
      filter: drop-shadow(0 0.055px 0.065px rgba(0, 0, 0, 0.34));
    }
    .player text {
      fill: #ffffff;
      font-size: 0.38px;
      font-weight: 900;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
    }
    .red-player-name {
      pointer-events: none;
    }
    .player text.red-name,
    .player text.red-player-name {
      font-weight: 800;
    }
    .player.selected circle:not(.hit-ring) {
      stroke: rgba(255, 255, 255, 0.92);
      stroke-width: 0.052;
      filter: drop-shadow(0 0.055px 0.075px rgba(0, 0, 0, 0.36));
    }
    .player.team-a.selected circle:not(.hit-ring) {
      stroke: rgba(45, 126, 232, 0.95);
      filter: drop-shadow(0 0.055px 0.075px rgba(0, 0, 0, 0.36)) drop-shadow(0 0 0.055px rgba(45, 126, 232, 0.7));
    }
    .player.team-b.selected circle:not(.hit-ring) {
      stroke: rgba(238, 48, 72, 0.95);
      filter: drop-shadow(0 0.055px 0.075px rgba(0, 0, 0, 0.36)) drop-shadow(0 0 0.055px rgba(238, 48, 72, 0.65));
    }
    .hit-ring {
      fill: transparent;
      stroke: transparent;
      stroke-width: 0;
      filter: none;
      pointer-events: all;
    }
    .ball.selected .ball-core {
      filter:
        brightness(1.08)
        drop-shadow(0 0 0.08px rgba(255, 255, 255, 0.24))
        drop-shadow(0 0.05px 0.07px rgba(0, 0, 0, 0.34));
    }
    .ball-core {
      fill: url(#ballPremium);
      stroke: #b85a00;
      stroke-width: 0.05;
      filter: drop-shadow(0 0.045px 0.055px rgba(0, 0, 0, 0.32));
    }
    .route-line {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }
    #routes,
    #routeLabels,
    #preview,
    #areas,
    #areaPreview,
    .route-label {
      pointer-events: none;
    }
    .area-box {
      fill: rgba(255, 212, 59, 0.16);
      stroke: #ffd43b;
      stroke-width: 0.08;
      rx: 0.12;
      ry: 0.12;
      pointer-events: none;
    }
    .area-box.preview {
      fill: rgba(255, 212, 59, 0.1);
      stroke-dasharray: 0.18 0.12;
    }
    .route-label rect,
    .route-label text {
      pointer-events: none;
    }
    .route-label rect {
      fill: #ffffff;
      stroke: #30343a;
      stroke-width: 0.035;
      rx: 0.08;
      ry: 0.08;
      vector-effect: non-scaling-stroke;
    }
    .route-label.run-route rect {
      fill: #f1f3f5;
      stroke: #727985;
      stroke-dasharray: 0.08 0.06;
    }
    .route-label text {
      fill: #111827;
      font-size: 0.32px;
      font-weight: 900;
      text-anchor: middle;
      dominant-baseline: middle;
    }
    .route-label.run-route text {
      fill: #30343a;
    }
    .toast {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      padding: 10px 14px;
      border-radius: 8px;
      background: rgba(26, 32, 44, 0.92);
      color: #ffffff;
      font-weight: 800;
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
    .fullscreen-ui {
      display: none;
      pointer-events: none;
    }
    .fullscreen-counter,
    .fullscreen-actions,
    .fullscreen-panel {
      pointer-events: auto;
    }
    .fullscreen-actions {
      position: absolute;
      left: max(8px, env(safe-area-inset-left));
      bottom: max(8px, env(safe-area-inset-bottom));
      z-index: 6;
      display: flex;
      gap: 4px;
    }
    .fullscreen-actions button,
    .fullscreen-panel button {
      min-height: 38px;
      padding: 6px 8px;
      font-size: clamp(10px, 1.2vw, 13px);
      border-color: rgba(174, 183, 195, 0.5);
      border-width: 1px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent 45%),
        linear-gradient(180deg, #26313f, #151c25);
      color: var(--rocks-text);
      box-shadow: 0 5px 16px rgba(0, 0, 0, 0.26), inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }
    #fullscreenMenuToggle {
      border-left: 4px solid var(--rocks-red-bright);
    }
    #fullscreenExit {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.85), rgba(210, 218, 228, 0.95));
      color: #111720;
    }
    .fullscreen-panel {
      position: absolute;
      left: max(8px, env(safe-area-inset-left));
      right: max(8px, env(safe-area-inset-right));
      bottom: calc(max(8px, env(safe-area-inset-bottom)) + 48px);
      z-index: 7;
      display: none;
      flex-wrap: wrap;
      gap: 4px;
      padding: 6px;
      overflow: visible;
      border: 1px solid rgba(174, 183, 195, 0.32);
      border-left: 4px solid var(--rocks-red);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent 45%),
        rgba(16, 22, 31, 0.92);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.34);
    }
    .fullscreen-scrim {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 6;
      pointer-events: auto;
      background: transparent;
    }
    .fullscreen-panel button {
      flex: 0 1 auto;
      box-shadow: none;
    }
    .fullscreen-counter {
      position: absolute;
      top: max(8px, env(safe-area-inset-top));
      right: max(8px, env(safe-area-inset-right));
      z-index: 6;
      display: flex;
      flex-direction: column;
      gap: 1px;
      padding: 6px 8px;
      border: 1px solid rgba(174, 183, 195, 0.5);
      border-left: 4px solid var(--rocks-red);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent 45%),
        rgba(14, 20, 28, 0.88);
      color: var(--rocks-text);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.15;
      white-space: nowrap;
    }
    .fullscreen-counter span {
      color: #ffffff;
    }
    body.fullscreen-mode .fullscreen-counter {
      display: none;
    }
    body.fullscreen-mode {
      overflow: visible;
      background:
        radial-gradient(circle at 50% 35%, rgba(58, 70, 88, 0.52), transparent 44%),
        linear-gradient(90deg, rgba(174, 183, 195, 0.045) 1px, transparent 1px) 0 0 / 32px 32px,
        linear-gradient(0deg, rgba(174, 183, 195, 0.035) 1px, transparent 1px) 0 0 / 32px 32px,
        var(--rocks-bg);
    }
    body.fullscreen-mode .app {
      position: fixed;
      inset: 0;
      z-index: 9999;
      width: 100vw;
      height: 100dvh;
      min-height: 100dvh;
      gap: 0;
      padding: 0;
      background:
        radial-gradient(circle at 50% 35%, rgba(58, 70, 88, 0.52), transparent 44%),
        linear-gradient(90deg, rgba(174, 183, 195, 0.045) 1px, transparent 1px) 0 0 / 32px 32px,
        linear-gradient(0deg, rgba(174, 183, 195, 0.035) 1px, transparent 1px) 0 0 / 32px 32px,
        var(--rocks-bg);
      overflow: hidden;
    }
    body.fullscreen-mode header,
    body.fullscreen-mode .rotate-hint {
      display: none;
    }
    body.fullscreen-mode .board-wrap {
      width: 100vw;
      height: 100dvh;
      min-height: 100dvh;
      flex: 1 1 auto;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      background:
        linear-gradient(90deg, rgba(174, 183, 195, 0.055) 1px, transparent 1px) 0 0 / 32px 32px,
        linear-gradient(0deg, rgba(174, 183, 195, 0.045) 1px, transparent 1px) 0 0 / 32px 32px,
        #111821;
    }
    body.fullscreen-mode svg {
      width: min(100vw, calc(100dvh * 1.6667));
      height: auto;
      max-width: 100vw;
      max-height: calc(100dvh - 58px);
      border-radius: 0;
    }
    body.fullscreen-mode .fullscreen-ui {
      display: block;

          await new Promise((resolve, reject) => {

            image.onerror = reject;
            image.src = url;

          canvas.height = 1200;
          const context = canvas.getContext("2d");
          context.fillStyle = "#111821";

          rect.setAttribute("rx", "0.08");
          rect.setAttribute("ry", "0.08");
          if (isRunRoute) rect.setAttribute("stroke-dasharray", "0.08 0.06");
          g.appendChild(rect);
          const text = makeSvg("text");
          text.setAttribute("x", "0");
          text.setAttribute("y", "0");
          text.setAttribute("fill", isRunRoute ? "#30343a" : "#111827");
          text.setAttribute("font-size", "0.32");
          text.setAttribute("font-weight", "900");
          text.setAttribute("text-anchor", "middle");
          text.setAttribute("dominant-baseline", "middle");
          text.textContent = routeNumber;
          g.appendChild(text);
          routeLabelsLayer.appendChild(g);
        });
        updateCounter();
      }
      function renderPreview(route) {
        previewLayer.textContent = "";
        if (route) previewLayer.appendChild(lineElement(route, true));
      }
      function resetAll() {
        players = initialPlayers();
        ball = { x: 10.55, y: 5 };
        routes = [];
        areas = [];
        history = [];
        interaction = null;
        clearSelected();
        renderAreas();
        renderAreaPreview(null);
        renderRoutes();
        renderPieces();
        updateMatchInfo();
      }
      function beginMove(event, target) {
        const id = target.dataset.id;
        const point = pointFromEvent(event);
        const item = id === "ball" ? ball : players.find((player) => player.id === id);
        if (!item) return;
        interaction = { kind: "move", id, dx: item.x - point.x, dy: item.y - point.y, pointerId: event.pointerId };
        clearSelected();
        target.classList.add("selected");
        try {
          target.setPointerCapture(event.pointerId);
        } catch (_) {
          /* Pointer capture can be unavailable for synthetic touch checks. */
        }
      }
      function beginRoute(event) {
        const counts = routeCounts();
        if (mode === "run" && counts.run >= maxRunRoutes) {
          showToast("選手移動は10本までです");
          return;
        }
        if (isBallRoute(mode) && counts.ball >= maxBallRoutes) {
          showToast("ボール軌道は10本までです");
          return;
        }
        const start = pointFromEvent(event);
        interaction = { kind: "route", type: mode, start, end: start, pointerId: event.pointerId };
        try {
          svg.setPointerCapture(event.pointerId);
        } catch (_) {
          /* Pointer capture can be unavailable for synthetic touch checks. */
        }
        renderPreview(interaction);
      }
      function beginArea(event) {
        if (areas.length >= maxAreas) {
          showToast("エリアは10個までです");
          return;
        }
        const start = pointFromEvent(event);
        interaction = { kind: "area", start, end: start, pointerId: event.pointerId };
        try {
          svg.setPointerCapture(event.pointerId);
        } catch (_) {
          /* Pointer capture can be unavailable for synthetic touch checks. */
        }
        renderAreaPreview(interaction);
      }
      function handlePointerDown(event) {
        if (event.button !== undefined && event.button !== 0) return;
        event.preventDefault();
        const piece = event.target.closest(".player, .ball");
        if (mode === "area") {
          beginArea(event);
        } else if (mode === "move" && piece) {
          beginMove(event, piece);
        } else if (mode !== "move") {
          beginRoute(event);
        }
      }
      function handlePointerMove(event) {
        if (!interaction || interaction.pointerId !== event.pointerId) return;
        event.preventDefault();
        const point = pointFromEvent(event);
        if (interaction.kind === "move") {
          const x = Math.max(0.25, Math.min(19.75, point.x + interaction.dx));
          const y = Math.max(0.25, Math.min(11.75, point.y + interaction.dy));
          if (interaction.id === "ball") {
            ball.x = x;
            ball.y = y;
          } else {
            const player = players.find((p) => p.id === interaction.id);
            if (player) {
              player.x = x;
              player.y = y;
              player.moved = true;
            }
          }
          renderPieces();
          const selected = piecesLayer.querySelector(`[data-id="${interaction.id}"]`);
          if (selected) selected.classList.add("selected");
        } else if (interaction.kind === "area") {
          interaction.end = point;
          renderAreaPreview(interaction);
        } else {
          interaction.end = point;
          renderPreview(interaction);
        }
      }
      function handlePointerUp(event) {
        if (!interaction || interaction.pointerId !== event.pointerId) return;
        event.preventDefault();
        if (interaction.kind === "route") {
          const dx = interaction.end.x - interaction.start.x;
          const dy = interaction.end.y - interaction.start.y;
          if (Math.hypot(dx, dy) > 0.25) {
            routes.push({ type: interaction.type, start: interaction.start, end: interaction.end });
            history.push({ type: "route", routeType: interaction.type });
            renderRoutes();
          }
          renderPreview(null);
        } else if (interaction.kind === "area") {
          const box = normalizeArea(interaction);
          if (box.width > 0.15 && box.height > 0.15) {
            areas.push({ start: interaction.start, end: interaction.end });
            history.push({ type: "area" });
            renderAreas();
          }
          renderAreaPreview(null);
        } else if (interaction.kind === "move") {
          clearSelected();
        }
        interaction = null;
      }
      modeButtons.forEach((button) => button.addEventListener("click", () => setMode(button.dataset.mode)));
      fullscreenToggle.addEventListener("click", toggleFullscreenMode);
      fullscreenExit.addEventListener("click", exitFullscreenMode);
      saveBoard.addEventListener("click", saveBoardImage);
      settingsOpen.addEventListener("click", openSettingsModal);
      settingsPlayerCount.addEventListener("change", updateSettingsNameVisibility);
      settingsSave.addEventListener("click", () => {
        const next = readSettingsDraft();
        applySettings(next);
        storeSettings(next);
        closeSettingsModal();
      });
      settingsCancel.addEventListener("click", closeSettingsModal);
      settingsClear.addEventListener("click", () => {
        if (!window.confirm("入力内容を消去しますか？")) return;
        const next = defaultSettings();
        writeSettingsDraft(next);
        applySettings(next);
        storeSettings(next);
      });
      fullscreenMenuToggle.addEventListener("click", (event) => {
        event.stopPropagation();
        const isOpen = document.body.classList.toggle("panel-open");
        fullscreenMenuToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
      });
      fullscreenScrim.addEventListener("pointerdown", closeFullscreenPanel);
      fullscreenPanel.addEventListener("pointerdown", (event) => event.stopPropagation());
      fullscreenPanel.addEventListener("click", (event) => {
        const button = event.target.closest("button");
        if (!button) return;
        if (button.dataset.mode) {
          setMode(button.dataset.mode);
          closeFullscreenPanel();
          return;
        }
        if (button.dataset.action) {
          if (button.dataset.action === "toggleNames") {
            toggleRedNames();
            closeFullscreenPanel();
            return;
          }
          document.getElementById(button.dataset.action).click();
          closeFullscreenPanel();
        }
      });
      document.addEventListener("fullscreenchange", () => {
        setFullscreenMode(Boolean(document.fullscreenElement));
      });
      document.getElementById("undo").addEventListener("click", () => {
        const last = history.pop();
        if (last?.type === "area") {
          areas.pop();
          renderAreas();
          return;
        }
        if (last?.type === "route") {
          routes.pop();
        } else if (routes.length) {
          routes.pop();
        } else if (areas.length) {
          areas.pop();
          renderAreas();
          return;
        }
        renderRoutes();
      });
      document.getElementById("clearRoutes").addEventListener("click", () => {
        routes = [];
        history = history.filter((item) => item.type !== "route");
        renderRoutes();
      });
      document.getElementById("clearAreas").addEventListener("click", () => {
        areas = [];
        history = history.filter((item) => item.type !== "area");
        renderAreas();
      });
      nameToggle.addEventListener("click", toggleRedNames);
      document.getElementById("reset").addEventListener("click", () => {
        resetAll();
        setMode("move");
      });
      svg.addEventListener("pointerdown", handlePointerDown);
      svg.addEventListener("pointermove", handlePointerMove);
      svg.addEventListener("pointerup", handlePointerUp);
      svg.addEventListener("pointercancel", handlePointerUp);
      window.addEventListener("blur", () => {
        interaction = null;
        renderPreview(null);
        renderAreaPreview(null);
      });
      buildSettingsOptions();
      buildSettingsNameInputs();
      applySettings(loadStoredSettings());
      resetAll();
      updateNameToggle();
    })();
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {
          /* Service Worker registration failure must not block the board. */
        });
      });
    }
  </script>
</body>
</html>
